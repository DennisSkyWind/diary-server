    function scrollToHeading(lineIndex) {
      const textarea = document.getElementById('markdown-input');
      const lines = textarea.value.split('\n');
      
      // 计算目标位置
      let pos = 0;
      for (let i = 0; i < lineIndex; i++) {
        pos += lines[i].length + 1;
      }
      
      // 聚焦并滚动
      textarea.focus();
      textarea.setSelectionRange(pos, pos + lines[lineIndex].length);
      
      // 滚动 textarea
      const lineHeight = 23;
      textarea.scrollTop = lineIndex * lineHeight;
      
      // 更新预览
      updatePreview();
    }
    
    // ========== Page Preview 悬浮预览 ==========
    let previewTooltip = null;
    let previewTimeout = null;
    
    function setupPagePreview() {
      // 监听预览区链接的鼠标事件
      document.getElementById('preview').addEventListener('mouseover', (e) => {
        const link = e.target.closest('a');
        if (!link) return;
        
        // 检查是否是Wiki链接（内部链接）
        const href = link.getAttribute('href');
        if (href && href.endsWith('.md')) {
          // 延迟显示预览
          previewTimeout = setTimeout(() => showPagePreview(link, href), 300);
          link.addEventListener('mouseleave', cancelPagePreview);
        }
      });
    }
    
    function cancelPagePreview() {
      if (previewTimeout) {
        clearTimeout(previewTimeout);
        previewTimeout = null;
      }
      hidePagePreview();
    }
    
    async function showPagePreview(link, filePath) {
      hidePagePreview();
      
      // 创建tooltip
      previewTooltip = document.createElement('div');
      previewTooltip.className = 'page-preview-tooltip';
      previewTooltip.innerHTML = '<div class="page-preview-loading">加载中...</div>';
      
      // 计算位置
      const rect = link.getBoundingClientRect();
      const tooltipWidth = 400;
      let left = rect.left;
      let top = rect.bottom + 8;
      
      // 边界检查
      if (left + tooltipWidth > window.innerWidth) {
        left = window.innerWidth - tooltipWidth - 20;
      }
      if (top + 350 > window.innerHeight) {
        top = rect.top - 350;
      }
      
      previewTooltip.style.left = left + 'px';
      previewTooltip.style.top = top + 'px';
      
      document.body.appendChild(previewTooltip);
      
      // 点击tooltip外部关闭
      setTimeout(() => {
        document.addEventListener('click', handlePreviewClick);
      }, 100);
      
      // 加载文件内容
      try {
        const res = await fetch('/api/file?path=' + encodeURIComponent(filePath));
        const data = await res.json();
        
        if (data.error) {
          previewTooltip.innerHTML = `<div class="page-preview-error">文件不存在: ${filePath}</div>`;
          return;
        }
        
        // 提取前200字作为预览
        const content = data.content || '';
        const previewContent = content.slice(0, 500);
        const lines = content.split('\n').slice(0, 15);
        
        // 解析标题
        const titleMatch = content.match(/^#\s+(.+)$/m);
        const title = titleMatch ? titleMatch[1] : path.basename(filePath);
        
        // 统计
        const chars = content.length;
        const wordCount = chars > 0 ? `${chars} 字` : '空文件';
        const mtime = data.mtime ? new Date(data.mtime).toLocaleDateString() : '';
        
        previewTooltip.innerHTML = `
          <div class="page-preview-title">
            <span>📄 ${title}</span>
            <span class="page-preview-close" onclick="hidePagePreview()">×</span>
          </div>
          <div class="page-preview-content">${lines.join('<br>').slice(0, 400)}...</div>
          <div class="page-preview-meta">
            <span>${wordCount}</span>
            <span>${mtime}</span>
            <a href="#" onclick="hidePagePreview();openFileByPath('${filePath}');return false;">打开文件</a>
          </div>
        `;
      } catch(e) {
        previewTooltip.innerHTML = `<div class="page-preview-error">加载失败</div>`;
      }
    }
    
    function handlePreviewClick(e) {
      if (previewTooltip && !previewTooltip.contains(e.target)) {
        hidePagePreview();
        document.removeEventListener('click', handlePreviewClick);
      }
    }
    
    function hidePagePreview() {
      if (previewTooltip) {
        previewTooltip.remove();
        previewTooltip = null;
      }
    }
    
    // ========== Note Composer 拆分/合并 ==========
    
    // P5-1: 拆分笔记 - 提取选中内容到新文件
    function extractSelection() {
      if (!currentFile) {
        alert('请先选择或创建文件');
        return;
      }
      
      const textarea = document.getElementById('markdown-input');
      const selection = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd);
      
      if (!selection || selection.trim().length < 10) {
        alert('请先选择要提取的内容（至少10个字符）');
        return;
      }
      
      // 从选中内容提取标题作为新文件名
      const titleMatch = selection.match(/^#\s+(.+)$/m);
      let suggestedName = titleMatch ? titleMatch[1].trim() : '新笔记';
      suggestedName = suggestedName.replace(/[\/\\:*?"<>|]/g, '').slice(0, 30);
      
      // 弹窗输入新文件名
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
      
      const box = document.createElement('div');
      box.style.cssText = 'background:#fff;padding:20px;border-radius:8px;max-width:400px;width:90%;';
      
      const currentDir = currentFile.includes('/') ? currentFile.split('/').slice(0, -1).join('/') : '';
      
      box.innerHTML = `
        <h3 style="margin:0 0 15px;">✂️ 提取内容到新笔记</h3>
        <div style="margin-bottom:10px;font-size:13px;color:#868e96;">将选中内容提取为新笔记，原位置留下链接</div>
        <input type="text" id="extract-filename" value="${suggestedName}.md" style="width:100%;padding:10px;border:1px solid #dee2e6;border-radius:4px;font-size:14px;" placeholder="新文件名.md">
        <div style="margin-top:10px;font-size:12px;color:#868e96;">目标目录: ${currentDir || '根目录'}</div>
        <div style="margin:15px 0;padding:10px;background:#f8f9fa;border-radius:4px;font-size:13px;max-height:100px;overflow-y:auto;">${selection.slice(0, 100)}...</div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button onclick="this.closest('div[style*=z-index]').remove()" style="padding:8px 16px;background:#e9ecef;border:none;border-radius:4px;cursor:pointer;">取消</button>
          <button onclick="doExtract('${currentDir}') " style="padding:8px 16px;background:#667eea;color:#fff;border:none;border-radius:4px;cursor:pointer;">提取</button>
        </div>
      `;
      
      modal.appendChild(box);
      document.body.appendChild(modal);
      
      document.getElementById('extract-filename').focus();
    }
    
    async function doExtract(targetDir) {
      const textarea = document.getElementById('markdown-input');
      const selection = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd);
      const newFileName = document.getElementById('extract-filename').value.trim();
      
      if (!newFileName.endsWith('.md')) {
        alert('文件名需要以 .md 结尾');
        return;
      }
      
      const newPath = targetDir ? `${targetDir}/${newFileName}` : newFileName;
      
      try {
        // 创建新文件
        const createRes = await fetch('/api/create-file', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({folder: targetDir, name: newFileName})
        });
        const createData = await createRes.json();
        
        if (!createData.success) {
          alert('创建文件失败: ' + createData.error);
          return;
        }
        
        // 写入内容到新文件
        await fetch('/api/save', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({path: newPath, content: selection})
        });
        
        // 替换原文件中的选中内容为链接
        const linkText = `[[${newFileName.replace('.md', '')}]]`;
        const newContent = textarea.value.substring(0, textarea.selectionStart) + linkText + textarea.value.substring(textarea.selectionEnd);
        
        textarea.value = newContent;
        await fetch('/api/save', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({path: currentFile, content: newContent})
        });
        
        // 关闭弹窗
        document.querySelector('div[style*="z-index:1000"]')?.remove();
        
        // 更新预览
        updatePreview();
        
        alert(`已提取到 ${newPath}`);
        
        // 刷新目录树
        location.reload();
      } catch(e) {
        alert('操作失败: ' + e.message);
      }
    }
    
    // P5-2: 合并笔记 - 选择其他笔记合并到当前
    function showMergeModal() {
      if (!currentFile) {
        alert('请先选择或创建文件');
        return;
      }
      
      // 获取文件列表
      fetch('/api/tree')
        .then(r => r.json())
        .then(data => {
          const files = [];
          const walk = (items) => {
            items.forEach(item => {
              if (item.type === 'file' && item.name.endsWith('.md') && item.path !== currentFile) {
                files.push(item);
              }
              if (item.children) walk(item.children);
            });
          };
          walk(data);
          
          const modal = document.createElement('div');
          modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
          
          const box = document.createElement('div');
          box.style.cssText = 'background:#fff;padding:20px;border-radius:8px;max-width:500px;width:90%;max-height:70vh;overflow-y:auto;';
          
          let fileHtml = '';
          files.slice(0, 30).forEach(f => {
            fileHtml += `<div style="padding:8px;border-bottom:1px solid #f1f3f5;display:flex;align-items:center;gap:8px;">
              <input type="checkbox" class="merge-file-check" data-path="${f.path}" data-name="${f.name}">
              <span style="font-size:14px;">📄 ${f.name}</span>
              <span style="font-size:12px;color:#868e96;">${f.path}</span>
            </div>`;
          });
          
          if (files.length === 0) {
            fileHtml = '<div style="padding:20px;text-align:center;color:#868e96;">没有可合并的文件</div>';
          }
          
          box.innerHTML = `
            <h3 style="margin:0 0 15px;display:flex;justify-content:space-between;">📎 合并笔记到当前文件 <button onclick="this.parentElement.parentElement.parentElement.remove()" style="padding:4px 8px;background:none;border:none;font-size:20px;cursor:pointer;">×</button></h3>
            <div style="margin-bottom:10px;font-size:13px;color:#868e96;">选择要合并的笔记，内容将追加到当前文件末尾</div>
            <div style="margin-bottom:10px;font-size:14px;color:#495057;">当前文件: ${currentFile}</div>
            <div style="border:1px solid #e9ecef;border-radius:4px;max-height:300px;overflow-y:auto;">
              ${fileHtml}
            </div>
            <div style="margin-top:15px;display:flex;gap:10px;justify-content:flex-end;">
              <button onclick="this.closest('div[style*=z-index]').remove()" style="padding:8px 16px;background:#e9ecef;border:none;border-radius:4px;cursor:pointer;">取消</button>
              <button onclick="doMerge()" style="padding:8px 16px;background:#667eea;color:#fff;border:none;border-radius:4px;cursor:pointer;">合并</button>
            </div>
          `;
          
          modal.appendChild(box);
          document.body.appendChild(modal);
        });
    }
    
    async function doMerge() {
      const checkboxes = document.querySelectorAll('.merge-file-check:checked');
      if (checkboxes.length === 0) {
        alert('请选择要合并的文件');
        return;
      }
      
      const textarea = document.getElementById('markdown-input');
      let currentContent = textarea.value;
      
      // 添加分隔
      currentContent += '\n\n---\n\n';
      
      // 逐个合并
      for (const cb of checkboxes) {
        const filePath = cb.dataset.path;
        
        try {
          const res = await fetch('/api/file?path=' + encodeURIComponent(filePath));
          const data = await res.json();
          
          if (data.content) {
            const fileName = cb.dataset.name.replace('.md', '');
            currentContent += `## 来自: ${fileName}\n\n${data.content}\n\n---\n\n`;
          }
        } catch(e) {
          console.error('合并失败:', filePath);
        }
      }
      
      // 更新编辑器
      textarea.value = currentContent;
      updatePreview();
      
      // 保存
      await fetch('/api/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({path: currentFile, content: currentContent})
      });
      
      // 关闭弹窗
      document.querySelector('div[style*="z-index:1000"]')?.remove();
      
      alert(`已合并 ${checkboxes.length} 个文件`);
    }
    
    // ========== Quick Switcher 快速切换 (Ctrl+K) ==========
    let quickSwitcherVisible = false;
    let quickSwitcherSelectedIndex = 0;
    let quickSwitcherResults = [];
    
    function showQuickSwitcher() {
      if (quickSwitcherVisible) return;
      quickSwitcherVisible = true;
      
      // 创建背景和弹窗
      const backdrop = document.createElement('div');
      backdrop.className = 'quick-switcher-backdrop';
      backdrop.onclick = hideQuickSwitcher;
      
      const modal = document.createElement('div');
      modal.className = 'quick-switcher-modal';
      modal.innerHTML = `
        <input type="text" class="quick-switcher-input" placeholder="搜索文件..." autofocus>
        <div class="quick-switcher-results"></div>
        <div class="quick-switcher-hint">↑↓ 选择 · Enter 打开 · Esc 关闭 · Ctrl+K 切换</div>
      `;
      
      document.body.appendChild(backdrop);
      document.body.appendChild(modal);
      
      const input = modal.querySelector('.quick-switcher-input');
      input.oninput = (e) => quickSwitcherSearch(e.target.value);
      input.onkeydown = handleQuickSwitcherKeydown;
      
      input.focus();
      quickSwitcherSelectedIndex = 0;
    }
    
    function hideQuickSwitcher() {
      quickSwitcherVisible = false;
      const backdrop = document.querySelector('.quick-switcher-backdrop');
      const modal = document.querySelector('.quick-switcher-modal');
      if (backdrop) backdrop.remove();
      if (modal) modal.remove();
      quickSwitcherResults = [];
    }
    
    async function quickSwitcherSearch(query) {
      const resultsDiv = document.querySelector('.quick-switcher-results');
      if (!resultsDiv) return;
      
      if (!query.trim()) {
        resultsDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#868e96;">输入关键词搜索文件</div>';
        quickSwitcherResults = [];
        return;
      }
      
      try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(query));
        const data = await res.json();
        
        if (data.success && data.results.length > 0) {
          quickSwitcherResults = data.results.slice(0, 20); // 最多显示20个
          quickSwitcherSelectedIndex = 0;
          
          let html = '';
          quickSwitcherResults.forEach((r, i) => {
            const selected = i === quickSwitcherSelectedIndex ? 'selected' : '';
            html += `
              <div class="quick-switcher-item ${selected}" data-index="${i}" onclick="selectQuickSwitcherItem(${i})">
                <div class="quick-switcher-icon">📄</div>
                <div class="quick-switcher-name">${r.name}</div>
                <div class="quick-switcher-path">${r.file}</div>
              </div>
            `;
          });
          resultsDiv.innerHTML = html;
        } else {
          resultsDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#868e96;">未找到匹配文件</div>';
          quickSwitcherResults = [];
        }
      } catch(e) {
        resultsDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#ff8787;">搜索出错</div>';
      }
    }
    
    function handleQuickSwitcherKeydown(e) {
      if (e.key === 'Escape') {
        hideQuickSwitcher();
        e.preventDefault();
      } else if (e.key === 'ArrowDown') {
        if (quickSwitcherResults.length > 0) {
          quickSwitcherSelectedIndex = Math.min(quickSwitcherSelectedIndex + 1, quickSwitcherResults.length - 1);
          updateQuickSwitcherSelection();
        }
        e.preventDefault();
      } else if (e.key === 'ArrowUp') {
        if (quickSwitcherResults.length > 0) {
          quickSwitcherSelectedIndex = Math.max(quickSwitcherSelectedIndex - 1, 0);
          updateQuickSwitcherSelection();
        }
        e.preventDefault();
      } else if (e.key === 'Enter') {
        if (quickSwitcherResults.length > 0) {
          selectQuickSwitcherItem(quickSwitcherSelectedIndex);
        }
        e.preventDefault();
      }
    }
    
    function updateQuickSwitcherSelection() {
      const items = document.querySelectorAll('.quick-switcher-item');
      items.forEach((item, i) => {
        item.classList.toggle('selected', i === quickSwitcherSelectedIndex);
      });
    }
    
    function selectQuickSwitcherItem(index) {
      if (quickSwitcherResults[index]) {
        hideQuickSwitcher();
        openFileByPath(quickSwitcherResults[index].file);
      }
    }
    
    // ========== Command Palette 命令面板 (Ctrl+P) ==========
    let commandPaletteVisible = false;
    let commandPaletteSelectedIndex = 0;
    const commands = [
      { id: 'quick-switch', name: '快速切换文件', icon: '🔍', shortcut: 'Ctrl+K', action: () => { hideCommandPalette(); showQuickSwitcher(); } },
      { id: 'search', name: '搜索内容', icon: '🔎', shortcut: '', action: () => { hideCommandPalette(); document.getElementById('file-search').focus(); } },
      { id: 'calendar', name: '日历视图', icon: '📅', shortcut: '', action: () => { hideCommandPalette(); showCalendarModal(); } },
      { id: 'dashboard', name: '统计仪表盘', icon: '📊', shortcut: '', action: () => { hideCommandPalette(); showDashboardModal(); } },
      { id: 'templates', name: '模板管理', icon: '📋', shortcut: '', action: () => { hideCommandPalette(); showTemplatesModal(); } },
      { id: 'graph', name: '知识图谱', icon: '🕸️', shortcut: '', action: () => { hideCommandPalette(); showGraphView(); } },
      { id: 'canvas', name: '打开Canvas画布', icon: '🎨', shortcut: '', action: () => { hideCommandPalette(); switchView('canvas'); } },
      { id: 'canvas-add-note', name: 'Canvas添加笔记卡片', icon: '📝', shortcut: '', action: () => { hideCommandPalette(); switchView('canvas'); canvasAddNote(); } },
      { id: 'bases', name: '打开Bases数据库视图', icon: '📊', shortcut: '', action: () => { hideCommandPalette(); switchView('bases'); } },
      { id: 'save', name: '保存当前文件', icon: '💾', shortcut: 'Ctrl+S', action: () => { hideCommandPalette(); saveFile(); } },
      { id: 'new-file', name: '新建文件', icon: '📝', shortcut: '', action: () => { hideCommandPalette(); createFile(); } },
      { id: 'toggle-sidebar', name: '切换左侧栏', icon: '📁', shortcut: '', action: () => { hideCommandPalette(); toggleSidebar(); } },
      { id: 'toggle-editor', name: '切换编辑区', icon: '👁️', shortcut: '', action: () => { hideCommandPalette(); toggleEditor(); } },
      { id: 'toggle-preview', name: '切换预览区', icon: '📖', shortcut: '', action: () => { hideCommandPalette(); togglePreview(); } },
      { id: 'ai-summary', name: 'AI摘要', icon: '🤖', shortcut: '', action: () => { hideCommandPalette(); showAiModal('summary'); } },
      { id: 'ai-polish', name: 'AI润色', icon: '✨', shortcut: '', action: () => { hideCommandPalette(); showAiModal('polish'); } },
    ];
    
    function showCommandPalette() {
      if (commandPaletteVisible) return;
      commandPaletteVisible = true;
      
      const backdrop = document.createElement('div');
      backdrop.className = 'quick-switcher-backdrop';
      backdrop.onclick = hideCommandPalette;
      
      const modal = document.createElement('div');
      modal.className = 'command-palette-modal';
      modal.innerHTML = `
        <input type="text" class="command-palette-input" placeholder="搜索命令..." autofocus>
        <div class="command-palette-results"></div>
        <div class="quick-switcher-hint">↑↓ 选择 · Enter 执行 · Esc 关闭 · Ctrl+P 切换</div>
      `;
      
      document.body.appendChild(backdrop);
      document.body.appendChild(modal);
      
      const input = modal.querySelector('.command-palette-input');
      input.oninput = (e) => filterCommands(e.target.value);
      input.onkeydown = handleCommandPaletteKeydown;
      
      filterCommands('');
      input.focus();
      commandPaletteSelectedIndex = 0;
    }
    
    function hideCommandPalette() {
      commandPaletteVisible = false;
      const backdrop = document.querySelector('.quick-switcher-backdrop');
      const modal = document.querySelector('.command-palette-modal');
      if (backdrop) backdrop.remove();
      if (modal) modal.remove();
    }
    
    function filterCommands(query) {
      const resultsDiv = document.querySelector('.command-palette-results');
      if (!resultsDiv) return;
      
      const filtered = query.trim() 
        ? commands.filter(c => c.name.toLowerCase().includes(query.toLowerCase()))
        : commands;
      
      let html = '';
      filtered.forEach((c, i) => {
        const selected = i === commandPaletteSelectedIndex ? 'selected' : '';
        html += `
          <div class="command-palette-item ${selected}" data-index="${i}" onclick="executeCommand(${i})">
            <span class="command-palette-icon">${c.icon}</span>
            <span class="command-palette-name">${c.name}</span>
            ${c.shortcut ? `<span class="command-palette-shortcut">${c.shortcut}</span>` : ''}
          </div>
        `;
      });
      resultsDiv.innerHTML = html || '<div style="padding:20px;text-align:center;color:#868e96;">未找到命令</div>';
    }
    
    function handleCommandPaletteKeydown(e) {
      const filtered = document.querySelectorAll('.command-palette-item');
      
      if (e.key === 'Escape') {
        hideCommandPalette();
        e.preventDefault();
      } else if (e.key === 'ArrowDown') {
        commandPaletteSelectedIndex = Math.min(commandPaletteSelectedIndex + 1, filtered.length - 1);
        updateCommandPaletteSelection();
        e.preventDefault();
      } else if (e.key === 'ArrowUp') {
        commandPaletteSelectedIndex = Math.max(commandPaletteSelectedIndex - 1, 0);
        updateCommandPaletteSelection();
        e.preventDefault();
      } else if (e.key === 'Enter') {
        executeCommand(commandPaletteSelectedIndex);
        e.preventDefault();
      }
    }
    
    function updateCommandPaletteSelection() {
      const items = document.querySelectorAll('.command-palette-item');
      items.forEach((item, i) => {
        item.classList.toggle('selected', i === commandPaletteSelectedIndex);
      });
    }
    
    function executeCommand(index) {
      const input = document.querySelector('.command-palette-input');
      const query = input ? input.value.trim() : '';
      const filtered = query 
        ? commands.filter(c => c.name.toLowerCase().includes(query.toLowerCase()))
        : commands;
      
      if (filtered[index]) {
        filtered[index].action();
      }
    }
    
    // ========== 全局快捷键监听 ==========
    document.addEventListener('keydown', (e) => {
      // Ctrl+K / ⌘K: Quick Switcher
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (quickSwitcherVisible) {
          hideQuickSwitcher();
        } else {
          hideCommandPalette();
          showQuickSwitcher();
        }
      }
      // Ctrl+P / ⌘P: Command Palette
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        if (commandPaletteVisible) {
          hideCommandPalette();
        } else {
          hideQuickSwitcher();
          showCommandPalette();
        }
      }
      // Ctrl+S: 保存
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveFile();
      }
    });
  </script>
</body>
</html>
