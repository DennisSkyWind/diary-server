<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>数据源配置 - 集成管理面板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header h1 { font-size: 24px; }
    
    .back-btn {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    .card .icon { font-size: 28px; margin-bottom: 10px; }
    .card .name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .card .desc { font-size: 13px; color: #888; margin-bottom: 10px; }
    .card .type { 
      display: inline-block;
      padding: 3px 10px;
      background: rgba(102, 126, 234, 0.3);
      border-radius: 20px;
      font-size: 12px;
      color: #a5b4fc;
    }
    .card .actions {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 8px;
    }
    .card .btn-action {
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .card .btn-action:hover { background: rgba(255,255,255,0.2); }
    .card .btn-action.delete { color: #ff6b6b; }
    .card .btn-action.delete:hover { background: rgba(255,107,107,0.2); }
    
    .add-card {
      background: rgba(255,255,255,0.03);
      border: 2px dashed rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-card:hover {
      border-color: #667eea;
      background: rgba(102,126,234,0.1);
    }
    .add-card .icon { font-size: 36px; opacity: 0.5; }
    .add-card span { color: #888; margin-top: 10px; }
    
    .form-panel {
      display: none;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .form-panel.show { display: block; }
    .form-panel h2 { margin-bottom: 20px; font-size: 18px; }
    
    .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
    .form-group { flex: 1; min-width: 200px; }
    .form-group label { display: block; margin-bottom: 6px; color: #888; font-size: 13px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      margin-right: 10px;
    }
    .btn:hover { background: #5568d3; }
    .btn-secondary { background: rgba(255,255,255,0.1); }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 16px 24px;
      background: #4caf50;
      color: white;
      border-radius: 8px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    .toast.show { display: block; }
    .toast.error { background: #f44336; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ 数据源配置</h1>
    <a href="/dashboard" class="back-btn">← 返回面板</a>
  </div>
  
  <p style="color:#888;margin-bottom:20px;">管理数据报告的数据源，支持 JSON、XML、SQLite、MySQL</p>
  
  <div class="grid" id="sourcesGrid">
    <!-- 动态加载数据源 -->
  </div>
  
  <div class="form-panel" id="formPanel">
    <h2 id="formTitle">添加数据源</h2>
    <div class="form-row">
      <div class="form-group">
        <label>名称</label>
        <input type="text" id="inputName" placeholder="如：股票持仓">
      </div>
      <div class="form-group">
        <label>图标</label>
        <select id="inputIcon">
          <option value="📊">📊 图表</option>
          <option value="📈">📈 股票</option>
          <option value="💰">💰 财务</option>
          <option value="📅">📅 日程</option>
          <option value="🎂">🎂 纪念日</option>
          <option value="❤️">❤️ 健康</option>
          <option value="⏰">⏰ 提醒</option>
          <option value="👁️">👁️ 关注</option>
          <option value="🗄️">🗄️ 数据库</option>
          <option value="📄">📄 文件</option>
        </select>
      </div>
      <div class="form-group">
        <label>分类</label>
        <select id="inputCategory">
          <option value="财务">财务</option>
          <option value="日程">日程</option>
          <option value="健康">健康</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>数据类型</label>
        <select id="inputType">
          <option value="json">JSON 文件</option>
          <option value="sqlite">SQLite 数据库</option>
          <option value="xml">XML 文件</option>
        </select>
      </div>
      <div class="form-group">
        <label>文件路径</label>
        <input type="text" id="inputPath" placeholder="./data/xxx.json">
      </div>
      <div class="form-group">
        <label>数据库表名（仅SQLite）</label>
        <input type="text" id="inputTable" placeholder="如：budget_plans">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>图表类型</label>
        <select id="inputChartType">
          <option value="bar">柱状图</option>
          <option value="line">折线图</option>
          <option value="pie">饼图</option>
          <option value="doughnut">环形图</option>
          <option value="table">数据表格</option>
          <option value="list">列表展示</option>
        </select>
      </div>
      <div class="form-group">
        <label>X轴字段</label>
        <input type="text" id="inputXField" placeholder="如：name">
      </div>
      <div class="form-group">
        <label>Y轴字段</label>
        <input type="text" id="inputYField" placeholder="如：amount">
      </div>
    </div>
    <div class="form-group">
      <label>描述</label>
      <input type="text" id="inputDesc" placeholder="数据源的简要说明">
    </div>
    <div style="margin-top:20px;">
      <button class="btn" onclick="saveSource()">保存</button>
      <button class="btn btn-secondary" onclick="hideForm()">取消</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    let sources = [];
    let editingIndex = -1;
    
    async function loadSources() {
      const res = await fetch('/api/report-sources');
      const config = await res.json();
      sources = config.data_sources || [];
      renderSources();
    }
    
    function renderSources() {
      const grid = document.getElementById('sourcesGrid');
      let html = sources.map((s, i) => `
        <div class="card">
          <div class="actions">
            <button class="btn-action" onclick="editSource(${i})">编辑</button>
            <button class="btn-action delete" onclick="deleteSource(${i})">删除</button>
          </div>
          <div class="icon">${s.icon}</div>
          <div class="name">${s.name}</div>
          <div class="desc">${s.desc || ''}</div>
          <span class="type">${s.type.toUpperCase()}</span>
        </div>
      `).join('');
      
      html += `
        <div class="card add-card" onclick="showAddForm()">
          <div class="icon">+</div>
          <span>添加数据源</span>
        </div>
      `;
      
      grid.innerHTML = html;
    }
    
    function showAddForm() {
      editingIndex = -1;
      document.getElementById('formTitle').textContent = '添加数据源';
      document.getElementById('inputName').value = '';
      document.getElementById('inputPath').value = '';
      document.getElementById('inputTable').value = '';
      document.getElementById('inputDesc').value = '';
      document.getElementById('inputXField').value = '';
      document.getElementById('inputYField').value = '';
      document.getElementById('formPanel').classList.add('show');
    }
    
    function editSource(index) {
      const s = sources[index];
      editingIndex = index;
      document.getElementById('formTitle').textContent = '编辑数据源';
      document.getElementById('inputName').value = s.name;
      document.getElementById('inputIcon').value = s.icon;
      document.getElementById('inputCategory').value = s.category;
      document.getElementById('inputType').value = s.type;
      document.getElementById('inputPath').value = s.path;
      document.getElementById('inputTable').value = s.table || '';
      document.getElementById('inputChartType').value = s.chart?.type || 'bar';
      document.getElementById('inputXField').value = s.chart?.x_field || '';
      document.getElementById('inputYField').value = s.chart?.y_field || '';
      document.getElementById('inputDesc').value = s.desc || '';
      document.getElementById('formPanel').classList.add('show');
    }
    
    function hideForm() {
      document.getElementById('formPanel').classList.remove('show');
    }
    
    async function saveSource() {
      const name = document.getElementById('inputName').value.trim();
      const path = document.getElementById('inputPath').value.trim();
      
      if (!name || !path) {
        showToast('名称和路径不能为空', true);
        return;
      }
      
      const newSource = {
        name: name,
        icon: document.getElementById('inputIcon').value,
        category: document.getElementById('inputCategory').value,
        type: document.getElementById('inputType').value,
        path: path,
        table: document.getElementById('inputTable').value || undefined,
        desc: document.getElementById('inputDesc').value,
        chart: {
          type: document.getElementById('inputChartType').value,
          x_field: document.getElementById('inputXField').value || undefined,
          y_field: document.getElementById('inputYField').value || undefined
        }
      };
      
      let newSources;
      if (editingIndex >= 0) {
        newSources = [...sources];
        newSources[editingIndex] = newSource;
      } else {
        newSources = [...sources, newSource];
      }
      
      // 保存到配置文件
      const res = await fetch('/api/config-save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          file: 'data-sources.json',
          data: {
            data_sources: newSources,
            chart_types: {'bar': '柱状图', 'line': '折线图', 'pie': '饼图', 'doughnut': '环形图', 'radar': '雷达图', 'table': '数据表格', 'list': '列表展示'},
            default_settings: {'auto_detect_chart': true, 'show_data_table': true, 'max_display_rows': 20}
          }
        })
      });
      
      const result = await res.json();
      if (result.success) {
        showToast(editingIndex >= 0 ? '更新成功' : '添加成功');
        hideForm();
        loadSources();
      } else {
        showToast(result.error || '保存失败', true);
      }
    }
    
    async function deleteSource(index) {
      if (!confirm('确定要删除这个数据源吗？')) return;
      
      const newSources = sources.filter((_, i) => i !== index);
      
      const res = await fetch('/api/config-save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          file: 'data-sources.json',
          data: {
            data_sources: newSources,
            chart_types: {'bar': '柱状图', 'line': '折线图', 'pie': '饼图', 'doughnut': '环形图', 'radar': '雷达图', 'table': '数据表格', 'list': '列表展示'},
            default_settings: {'auto_detect_chart': true, 'show_data_table': true, 'max_display_rows': 20}
          }
        })
      });
      
      const result = await res.json();
      if (result.success) {
        showToast('删除成功');
        loadSources();
      } else {
        showToast(result.error || '删除失败', true);
      }
    }
    
    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    loadSources();
  </script>
</body>
</html>
