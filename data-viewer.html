<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>数据查看器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header h1 { font-size: 24px; }
    .header .tag {
      background: rgba(102, 126, 234, 0.3);
      color: #a5b4fc;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .breadcrumb {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }
    
    .table-container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background: rgba(102, 126, 234, 0.3);
      padding: 14px 20px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    td {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    
    tr:hover {
      background: rgba(255,255,255,0.05);
    }
    
    tr:last-child td {
      border-bottom: none;
    }
    
    .empty {
      padding: 40px;
      text-align: center;
      color: #888;
    }
    
    .error {
      padding: 40px;
      text-align: center;
      color: #ff6b6b;
    }
    
    .back-btn {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .source-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 30px;
    }
    
    .source-list .source-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .source-list .source-item:hover {
      background: rgba(255,255,255,0.1);
      border-color: #667eea;
    }
    
    .source-list .icon { font-size: 20px; }
    .source-list .name { flex: 1; font-weight: 500; }
    .source-list .type { 
      font-size: 11px; 
      padding: 3px 8px; 
      background: rgba(102,126,234,0.3); 
      border-radius: 10px;
      color: #a5b4fc;
    }
    
    .tab {
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .tab.active {
      background: #667eea;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin: 20px 0 15px;
    }
    
    .info-box {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .info-box h3 {
      font-size: 16px;
      margin-bottom: 15px;
      color: #a5b4fc;
    }
    
    /* 数据源列表样式 */
    .source-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px 0;
    }
    
    .source-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 20px;
      text-decoration: none;
      color: #fff;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .source-item:hover {
      background: rgba(102, 126, 234, 0.3);
      transform: translateY(-2px);
      border-color: rgba(102, 126, 234, 0.5);
    }
    
    .source-item .icon {
      font-size: 28px;
    }
    
    .source-item .name {
      font-size: 16px;
      font-weight: 500;
    }
    
    .source-item .type {
      font-size: 11px;
      color: #888;
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <a href="/dashboard" class="back-btn">← 返回管理面板</a>
  
  <div class="header">
    <h1 id="title">数据查看</h1>
    <span class="tag" id="category">数据</span>
  </div>
  
  <div class="breadcrumb" id="path"></div>
  
  <div id="tabs" class="tabs"></div>
  <div id="content">
    <div class="empty">加载中...</div>
  </div>
  
  <script>
    // 从 URL 获取文件路径
    const params = new URLSearchParams(window.location.search);
    const filePath = params.get('path');
    const tableName = params.get('table');
    
    // 检查是否有后端注入的数据源列表
    const sourceListExists = document.querySelector('.source-list') !== null;
    
    if (!filePath && !sourceListExists) {
      document.getElementById('content').innerHTML = '<div class="error">未指定文件路径</div>';
    } else if (!filePath) {
      // 有数据源列表，用户可以点击选择数据源，不需要额外处理
    } else {
      document.getElementById('path').textContent = filePath;
      
      // 获取文件名作为标题
      const fileName = filePath.split('/').pop();
      document.getElementById('title').textContent = fileName;
      
      // 获取文件类型
      const ext = fileName.split('.').pop().toLowerCase();
      if (ext === 'json') {
        document.getElementById('category').textContent = 'JSON';
        loadJSON();
      } else if (ext === 'db') {
        document.getElementById('category').textContent = 'SQLite 数据库';
        loadDatabase(tableName);
      }
    }
    
    function loadJSON() {
      fetch('/api/data-file?path=' + encodeURIComponent(filePath))
        .then(res => res.json())
        .then(data => {
          renderTable(data);
        })
        .catch(err => {
          document.getElementById('content').innerHTML = '<div class="error">加载失败: ' + err.message + '</div>';
        });
    }
    
    function loadDatabase(table) {
      fetch('/api/data-file?path=' + encodeURIComponent(filePath))
        .then(res => res.json())
        .then(data => {
          if (data.type === 'database') {
            renderDatabase(data.tables, table);
          } else {
            renderTable(data);
          }
        })
        .catch(err => {
          document.getElementById('content').innerHTML = '<div class="error">加载失败: ' + err.message + '</div>';
        });
    }
    
    function renderDatabase(tables, activeTable) {
      const tabsContainer = document.getElementById('tabs');
      const contentContainer = document.getElementById('content');
      
      if (tables.length === 0) {
        contentContainer.innerHTML = '<div class="empty">数据库中没有表</div>';
        return;
      }
      
      // 渲染表标签 - 支持数组和对象两种格式
      let tableNames = Array.isArray(tables) ? tables : Object.keys(tables);
      tabsContainer.innerHTML = tableNames.map(t => 
        `<button class="tab ${t === activeTable ? 'active' : ''}" onclick="loadTable('${t}')">${t}</button>`
      ).join('');
      
      if (activeTable) {
        loadTableData(activeTable);
      } else {
        contentContainer.innerHTML = '<div class="empty">请选择一个表查看数据</div>';
      }
    }
    
    function loadTable(table) {
      // 更新标签状态
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.toggle('active', tab.textContent === table);
      });
      
      // 加载表数据
      loadTableData(table);
    }
    
    function loadTableData(table) {
      const contentContainer = document.getElementById('content');
      contentContainer.innerHTML = '<div class="empty">加载中...</div>';
      
      fetch('/api/db-table?path=' + encodeURIComponent(filePath) + '&table=' + encodeURIComponent(table))
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            contentContainer.innerHTML = '<div class="error">' + data.error + '</div>';
            return;
          }
          
          renderTableData(data.schema, data.data);
        })
        .catch(err => {
          contentContainer.innerHTML = '<div class="error">加载失败: ' + err.message + '</div>';
        });
    }
    
    function renderTableData(schema, data) {
      const contentContainer = document.getElementById('content');
      
      if (!data || data.length === 0) {
        contentContainer.innerHTML = '<div class="empty">表中没有数据</div>';
        return;
      }
      
      // 构建表格
      let html = '<div class="table-container"><table><thead><tr>';
      
      // 表头
      const columns = schema ? schema.map(s => s.name) : Object.keys(data[0]);
      columns.forEach(col => html += `<th>${col}</th>`);
      html += '</tr></thead><tbody>';
      
      // 表数据
      data.forEach(row => {
        html += '<tr>';
        columns.forEach(col => {
          let val = row[col];
          if (val === null || val === undefined) val = '';
          if (typeof val === 'object') val = JSON.stringify(val);
          html += `<td>${val}</td>`;
        });
        html += '</tr>';
      });
      
      html += '</tbody></table></div>';
      
      // 添加统计信息
      html = `<div class="info-box"><h3>📊 表数据统计</h3><p>共 ${data.length} 条记录，${columns} 个字段</p></div>` + html;
      
      contentContainer.innerHTML = html;
    }
    
    function renderTable(data) {
      const container = document.getElementById('content');
      
      if (!data) {
        container.innerHTML = '<div class="empty">数据为空</div>';
        return;
      }
      
      // 处理数组类型数据
      if (Array.isArray(data)) {
        if (data.length === 0) {
          container.innerHTML = '<div class="empty">数组为空</div>';
          return;
        }
        
        // 获取所有字段
        const allKeys = new Set();
        data.forEach(item => {
          if (item && typeof item === 'object') {
            Object.keys(item).forEach(k => allKeys.add(k));
          }
        });
        const keys = Array.from(allKeys);
        
        // 构建表格
        let html = '<div class="table-container"><table><thead><tr>';
        keys.forEach(k => html += `<th>${k}</th>`);
        html += '</tr></thead><tbody>';
        
        data.forEach(item => {
          html += '<tr>';
          keys.forEach(k => {
            let val = item[k];
            if (val === null || val === undefined) val = '';
            if (typeof val === 'object') val = JSON.stringify(val);
            html += `<td>${val}</td>`;
          });
          html += '</tr>';
        });
        
        html += '</tbody></table></div>';
        
        // 添加统计
        html = `<div class="info-box"><h3>📊 数据统计</h3><p>共 ${data.length} 条记录</p></div>` + html;
        container.innerHTML = html;
        return;
      }
      
      // 处理对象类型数据
      if (typeof data === 'object') {
        let html = '<div class="table-container"><table><tbody>';
        Object.keys(data).forEach(key => {
          let val = data[key];
          if (val === null || val === undefined) val = '';
          if (typeof val === 'object') val = JSON.stringify(val, null, 2);
          html += `<tr><th style="width:200px;">${key}</th><td><pre style="margin:0;white-space:pre-wrap;">${val}</pre></td></tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
        return;
      }
      
      // 原始数据类型
      container.innerHTML = '<div class="empty">' + data + '</div>';
    }
  </script>
</body>
</html>
